# ── Dev H2 datasource ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:courtdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Gmail SMTP ─────────────────────────────────────────────────────────────────
# TODO: switch to an application-prod.properties and use a dedicated mail user
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_ADDRESS}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Admin credentials (HTTP Basic) ─────────────────────────────────────────────
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}
